<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Team — MoMs</title>
  <style>
    :root {
      --bg: #0c0c0e;
      --sidebar-bg: #111113;
      --surface: #17171a;
      --surface2: #1e1e22;
      --surface3: #252529;
      --border: #27272d;
      --border-light: #1f1f24;
      --accent: #7c6af7;
      --accent-dim: #7c6af720;
      --accent-mid: #7c6af740;
      --text: #ececf0;
      --text-muted: #80808c;
      --text-dim: #3e3e4a;
      --yellow: #f5a623;
      --yellow-dim: #f5a62318;
      --radius: 10px;
      --radius-sm: 7px;
      --sidebar-w: 240px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      position: fixed;
      top: 0; left: 0;
      overflow-y: auto;
      z-index: 10;
    }

    .sidebar-logo {
      padding: 0 18px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .sidebar-logo h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.1px;
    }

    .sidebar-logo p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .sidebar-section {
      padding: 0 18px;
      margin-bottom: 24px;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .7px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    /* month nav */
    .month-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .month-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .12s;
      color: var(--text-muted);
      font-size: 12px;
    }

    .month-item:hover { background: var(--surface2); color: var(--text); }
    .month-item.active { background: var(--accent-dim); color: var(--accent); }

    .month-item .month-count {
      font-size: 10px;
      background: var(--surface3);
      color: var(--text-dim);
      padding: 1px 6px;
      border-radius: 999px;
      font-weight: 500;
    }

    .month-item.active .month-count {
      background: var(--accent-mid);
      color: var(--accent);
    }

    /* person filters */
    .person-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .person-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .12s;
      color: var(--text-muted);
      font-size: 12px;
      user-select: none;
    }

    .person-item:hover { background: var(--surface2); color: var(--text); }
    .person-item.active { color: var(--text); }

    .person-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .person-check {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid var(--border);
      margin-left: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .12s;
    }

    .person-item.active .person-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .person-check svg { display: none; }
    .person-item.active .person-check svg { display: block; }

    /* clear btn */
    .clear-btn {
      margin: 0 18px;
      margin-top: auto;
      padding: 7px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: all .12s;
    }

    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* top bar */
    .topbar {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 5;
    }

    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      padding: 7px 12px 7px 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 12.5px;
      outline: none;
      transition: border-color .15s;
    }

    input[type="search"]:focus { border-color: var(--accent); }
    input[type="search"]::placeholder { color: var(--text-dim); }

    .result-count {
      font-size: 11.5px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* active filter chips */
    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 32px;
      border-bottom: 1px solid var(--border-light);
      min-height: 0;
    }

    .active-filters:empty { display: none; }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px 3px 10px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-mid);
      border-radius: 999px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
    }

    .filter-chip button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      opacity: .7;
    }

    .filter-chip button:hover { opacity: 1; }

    /* feed */
    .feed {
      padding: 32px 32px 80px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* month group */
    .month-group {}

    .month-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .month-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: .3px;
      text-transform: uppercase;
    }

    .month-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .month-badge {
      font-size: 10px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 999px;
    }

    /* meeting card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .15s;
    }

    .card:hover { border-color: #33333c; }
    .card + .card { margin-top: 8px; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
    }

    .card-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 36px;
      flex-shrink: 0;
    }

    .card-weekday {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-dim);
    }

    .card-daynum {
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
      letter-spacing: -1px;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-participants {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 5px;
    }

    .participant-tag {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 999px;
      font-weight: 500;
      background: var(--surface3);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .card-preview {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 500px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .duration-badge {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .chevron {
      color: var(--text-dim);
      transition: transform .2s;
      flex-shrink: 0;
    }

    .card.open .chevron { transform: rotate(180deg); }

    .card-body {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid var(--border-light);
    }

    .card.open .card-body { display: block; }

    /* michi time */
    .michi-block {
      background: var(--yellow-dim);
      border: 1px solid #f5a62325;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-top: 14px;
      margin-bottom: 14px;
    }

    .michi-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .michi-text {
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* wip grid */
    .wip-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .wip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }

    .wip-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      transition: border-color .12s;
    }

    .wip-card:hover { border-color: #33333c; }

    .wip-card.empty { opacity: .3; }

    .wip-member {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }

    .wip-avatar {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .wip-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .wip-card:not(.empty) .wip-name { color: var(--text); }

    .wip-text {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .wip-card.empty .wip-text { color: var(--text-dim); font-style: italic; }

    /* highlight */
    mark {
      background: #f5a62340;
      color: var(--yellow);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state h3 { font-size: 15px; margin-bottom: 6px; color: var(--text); }
    .empty-state p { font-size: 12.5px; }

    /* avatar colors */

    .av-jime   { background: #ec489918; color: #f472b6; }
    .av-juanpa { background: #f59e0b18; color: #fbbf24; }

    .av-luigi  { background: #8b5cf618; color: #a78bfa; }
    .av-pablos { background: #ef444418; color: #f87171; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>

// ── CONFIG ──
const members = [
  { key: "win",    label: "Win",    av: "av-win"    },
  { key: "jime",   label: "Jime",   av: "av-jime"   },
  { key: "juanpa", label: "JuanPa", av: "av-juanpa" },
  { key: "lu",     label: "Lu",     av: "av-lu"     },
  { key: "luigi",  label: "Luigi",  av: "av-luigi"  },
  { key: "pablos", label: "Pablos", av: "av-pablos" },
];

// ── STATE ──
let activeMonth  = null;   // "2026-03" or null
let activePersons = [];    // ["win","lu",…]
let searchQ      = "";

// ── MONTH HELPERS ──
function monthKey(iso) { return iso.slice(0, 7); }

function monthLabel(key) {
  const [y, m] = key.split("-");
  return new Date(+y, +m - 1, 1).toLocaleDateString("es-UY", { month: "long", year: "numeric" });
}

function monthLabelShort(key) {
  const [y, m] = key.split("-");
  return new Date(+y, +m - 1, 1).toLocaleDateString("es-UY", { month: "short", year: "2-digit" });
}

function weekday(iso) {
  return new Date(iso + "T00:00:00").toLocaleDateString("es-UY", { weekday: "short" });
}

function dayNum(iso) {
  return iso.slice(8);
}

// ── FILTER LOGIC ──
function filtered() {
  const q = searchQ.toLowerCase();
  return [...meetings].reverse().filter(m => {
    if (activeMonth && monthKey(m.date) !== activeMonth) return false;
    if (activePersons.length) {
      const hasWip = activePersons.every(p => (m.wip[p] || "").trim());
      if (!hasWip) return false;
    }
    if (q) {
      const blob = [m.michi, ...Object.values(m.wip), m.participants.join(" ")].join(" ").toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
}

// ── HIGHLIGHT ──
function hl(text) {
  if (!searchQ) return text;
  const re = new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");
  return text.replace(re, "<mark>$1</mark>");
}

// ── SIDEBAR: MONTH LIST ──
function buildMonthList() {
  const counts = {};
  meetings.forEach(m => { const k = monthKey(m.date); counts[k] = (counts[k] || 0) + 1; });
  const keys = [...new Set(meetings.map(m => monthKey(m.date)))].sort().reverse();

  const ul = document.getElementById("monthList");
  ul.innerHTML = "";

  // All option
  const allLi = document.createElement("li");
  allLi.className = "month-item" + (activeMonth === null ? " active" : "");
  allLi.innerHTML = `<span>All time</span><span class="month-count">${meetings.length}</span>`;
  allLi.onclick = () => { activeMonth = null; render(); };
  ul.appendChild(allLi);

  keys.forEach(k => {
    const li = document.createElement("li");
    li.className = "month-item" + (activeMonth === k ? " active" : "");
    li.innerHTML = `<span style="text-transform:capitalize">${monthLabelShort(k)}</span><span class="month-count">${counts[k]}</span>`;
    li.onclick = () => { activeMonth = (activeMonth === k ? null : k); render(); };
    ul.appendChild(li);
  });
}

// ── SIDEBAR: PERSON LIST ──
function buildPersonList() {
  const el = document.getElementById("personList");
  el.innerHTML = members.map(({ key, label, av }) => {
    const active = activePersons.includes(key);
    return `
      <div class="person-item ${active ? "active" : ""}" onclick="togglePerson('${key}')">
        <span class="person-avatar ${av}">${label[0]}</span>
        <span>${label}</span>
        <span class="person-check">
          <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>
        </span>
      </div>`;
  }).join("");
}

function togglePerson(key) {
  activePersons = activePersons.includes(key)
    ? activePersons.filter(p => p !== key)
    : [...activePersons, key];
  render();
}

function clearFilters() {
  activeMonth = null;
  activePersons = [];
  searchQ = "";
  document.getElementById("search").value = "";
  render();
}

// ── ACTIVE FILTER CHIPS ──
function buildChips() {
  const el = document.getElementById("activeFilters");
  const chips = [];

  if (activeMonth) {
    chips.push(`<span class="filter-chip">
      ${monthLabel(activeMonth).charAt(0).toUpperCase() + monthLabel(activeMonth).slice(1)}
      <button onclick="activeMonth=null;render()">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
      </button>
    </span>`);
  }

  activePersons.forEach(key => {
    const m = members.find(m => m.key === key);
    chips.push(`<span class="filter-chip">
      ${m.label}
      <button onclick="activePersons=activePersons.filter(p=>p!=='${key}');render()">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
      </button>
    </span>`);
  });

  el.innerHTML = chips.join("");
}

// ── MAIN RENDER ──
function render() {
  buildMonthList();
  buildPersonList();
  buildChips();

  const results = filtered();
  const feed = document.getElementById("feed");
  const empty = document.getElementById("emptyState");
  const count = document.getElementById("resultCount");

  count.textContent = `${results.length} standup${results.length !== 1 ? "s" : ""}`;

  if (!results.length) {
    feed.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  // Group by month
  const groups = {};
  results.forEach(m => {
    const k = monthKey(m.date);
    if (!groups[k]) groups[k] = [];
    groups[k].push(m);
  });

  feed.innerHTML = Object.entries(groups).map(([month, items]) => `
    <div class="month-group">
      <div class="month-header">
        <span class="month-title">${monthLabel(month)}</span>
        <span class="month-line"></span>
        <span class="month-badge">${items.length} standup${items.length !== 1 ? "s" : ""}</span>
      </div>
      ${items.map((m, i) => renderCard(m, month + i)).join("")}
    </div>
  `).join("");
}

function renderCard(m, id) {
  const wipCards = members.map(({ key, label, av }) => {
    const text = m.wip[key] || "";
    return `
      <div class="wip-card ${!text ? "empty" : ""}">
        <div class="wip-member">
          <span class="wip-avatar ${av}">${label[0]}</span>
          <span class="wip-name">${label}</span>
        </div>
        <div class="wip-text">${text ? hl(text) : "—"}</div>
      </div>`;
  }).join("");

  const michiHtml = m.michi ? `
    <div class="michi-block">
      <div class="michi-label">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        Michi time
      </div>
      <div class="michi-text">${hl(m.michi)}</div>
    </div>` : "";

  const preview = Object.values(m.wip).filter(Boolean).slice(0, 3).join(" · ");

  return `
    <div class="card" id="card-${id}">
      <div class="card-header" onclick="document.getElementById('card-${id}').classList.toggle('open')">
        <div class="card-day">
          <span class="card-weekday">${weekday(m.date)}</span>
          <span class="card-daynum">${dayNum(m.date)}</span>
        </div>
        <div class="card-info">
          <div class="card-participants">
            ${m.participants.map(p => `<span class="participant-tag">${p}</span>`).join("")}
          </div>
          <div class="card-preview">${hl(preview)}</div>
        </div>
        <div class="card-meta">
          ${m.duration ? `<span class="duration-badge">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${m.duration}
          </span>` : ""}
          <svg class="chevron" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
      <div class="card-body">
        ${michiHtml}
        <div class="wip-label">Work in progress</div>
        <div class="wip-grid">${wipCards}</div>
      </div>
    </div>`;
}

// ── SEARCH ──
document.getElementById("search").addEventListener("input", e => {
  searchQ = e.target.value.trim().toLowerCase();
  render();
});

// ── INIT ──
render();
</script>
