<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Team — MoMs</title>
  <style>
    :root {
      --bg: #0c0c0e;
      --sidebar-bg: #111113;
      --surface: #17171a;
      --surface2: #1e1e22;
      --surface3: #252529;
      --border: #27272d;
      --border-light: #1f1f24;
      --accent: #7c6af7;
      --accent-dim: #7c6af714;
      --accent-mid: #7c6af735;
      --text: #ececf0;
      --text-muted: #80808c;
      --text-dim: #3e3e4a;
      --yellow: #f5a623;
      --yellow-dim: #f5a62314;
      --green: #34d399;
      --radius: 10px;
      --radius-sm: 7px;
      --sidebar-w: 220px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      overflow-y: auto;
      z-index: 10;
      padding-bottom: 24px;
    }

    .sidebar-logo {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-logo h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .sidebar-stats {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 3px;
    }

    /* collapsible sections */
    .sec {
      border-bottom: 1px solid var(--border-light);
    }

    .sec-header {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 9px 14px 7px;
      cursor: pointer;
      user-select: none;
    }

    .sec-header:hover .sec-label { color: var(--text-muted); }

    .sec-chevron {
      color: var(--text-dim);
      transition: transform .15s;
      flex-shrink: 0;
    }

    .sec.collapsed .sec-chevron { transform: rotate(-90deg); }
    .sec.collapsed .sec-body { display: none; }

    .sec-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .65px;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color .12s;
    }

    .sec-body { padding: 2px 8px 10px; }

    /* people grid */
    .people-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }

    .person-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 7px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .12s;
      color: var(--text-muted);
      font-size: 11.5px;
      user-select: none;
    }

    .person-pill:hover { background: var(--surface2); color: var(--text); }
    .person-pill.active {
      background: var(--accent-dim);
      border-color: var(--accent-mid);
      color: var(--accent);
    }

    .pill-av {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* month list */
    .month-list { list-style: none; display: flex; flex-direction: column; gap: 1px; }

    .month-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .12s;
      color: var(--text-muted);
      font-size: 11.5px;
      user-select: none;
    }

    .month-item:hover { background: var(--surface2); color: var(--text); }
    .month-item.active { background: var(--accent-dim); color: var(--accent); }

    .month-count {
      font-size: 10px;
      background: var(--surface3);
      color: var(--text-dim);
      padding: 1px 6px;
      border-radius: 999px;
      font-weight: 500;
    }

    .month-item.active .month-count { background: var(--accent-mid); color: var(--accent); }

    /* quick filters */
    .quick-list { display: flex; flex-direction: column; gap: 1px; }

    .quick-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 11.5px;
      transition: all .12s;
      user-select: none;
    }

    .quick-item:hover { background: var(--surface2); color: var(--text); }
    .quick-item.active { background: var(--accent-dim); color: var(--accent); }

    .quick-icon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      background: var(--surface3);
    }

    /* clear */
    .clear-btn {
      margin: 10px 16px 0;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: all .12s;
      display: none;
      font-family: inherit;
    }

    .clear-btn.visible { display: block; }
    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 11px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 5;
    }

    .search-wrap {
      flex: 1;
      max-width: 420px;
      position: relative;
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      padding: 7px 12px 7px 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 12.5px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }

    input[type="search"]:focus { border-color: var(--accent); }
    input[type="search"]::placeholder { color: var(--text-dim); }

    .result-count {
      font-size: 11.5px;
      color: var(--text-dim);
      white-space: nowrap;
      margin-left: auto;
    }

    /* filter chips */
    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 8px 28px;
      border-bottom: 1px solid var(--border-light);
    }

    .active-filters:empty { display: none; }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 7px 3px 9px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-mid);
      border-radius: 999px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
    }

    .filter-chip button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      opacity: .6;
      line-height: 1;
    }

    .filter-chip button:hover { opacity: 1; }

    /* feed */
    .feed {
      padding: 24px 28px 80px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* month group */
    .month-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0 10px;
      cursor: pointer;
      user-select: none;
    }

    .month-header:hover .mh-title { color: var(--text); }

    .mh-chevron {
      color: var(--text-dim);
      transition: transform .2s;
      flex-shrink: 0;
    }

    .month-group.collapsed .mh-chevron { transform: rotate(-90deg); }
    .month-group.collapsed .month-cards { display: none; }
    .month-group + .month-group { margin-top: 16px; }

    .mh-title {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: .3px;
      text-transform: uppercase;
      transition: color .12s;
    }

    .mh-line { flex: 1; height: 1px; background: var(--border); }

    .mh-badge {
      font-size: 10px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 999px;
    }

    /* card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .15s;
    }

    .card:hover { border-color: #2e2e36; }
    .card + .card { margin-top: 5px; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
    }

    .card-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 32px;
      flex-shrink: 0;
    }

    .card-wd {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-dim);
    }

    .card-dd {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
      letter-spacing: -1px;
    }

    .card-sep {
      width: 1px;
      height: 30px;
      background: var(--border);
      flex-shrink: 0;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-avs {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 4px;
    }

    .cav {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .card-preview {
      font-size: 11.5px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .dur-badge {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .michi-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--yellow);
      opacity: .5;
      flex-shrink: 0;
    }

    .fathom-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      transition: all .12s;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .fathom-btn:hover {
      background: var(--accent-dim);
      border-color: var(--accent-mid);
      color: var(--accent);
    }

    .card-day-no-rec {
      height: 20px;
      margin-top: 4px;
    }

    .chevron {
      color: var(--text-dim);
      transition: transform .2s;
      flex-shrink: 0;
    }

    .card.open .chevron { transform: rotate(180deg); }

    .card-body {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border-light);
    }

    .card.open .card-body { display: block; }

    /* michi */
    .michi-block {
      background: var(--yellow-dim);
      border: 1px solid #f5a62322;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-top: 14px;
      margin-bottom: 14px;
    }

    .michi-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .michi-text {
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* bajada */
    .bajada-block {
      background: #06b6d410;
      border: 1px solid #06b6d422;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-top: 10px;
      margin-bottom: 14px;
    }

    .bajada-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: #22d3ee;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .bajada-text {
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* wip */
    .wip-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .wip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(196px, 1fr));
      gap: 7px;
    }

    .wip-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      transition: border-color .12s;
    }

    .wip-card:hover { border-color: #2e2e36; }
    .wip-card.empty { opacity: .28; }

    .wip-member {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }

    .wip-av {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .wip-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .wip-card:not(.empty) .wip-name { color: var(--text); }

    .wip-text {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .wip-card.empty .wip-text { color: var(--text-dim); font-style: italic; }

    /* guests */
    .guests-section {
      margin-top: 14px;
    }

    .guests-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: #a78bfa;
      margin-bottom: 8px;
    }

    .guest-card {
      background: #8b5cf610;
      border: 1px solid #8b5cf622;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-bottom: 7px;
    }

    .guest-name {
      font-size: 11px;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 4px;
    }

    .guest-text {
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    mark {
      background: #f5a62335;
      color: var(--yellow);
      border-radius: 2px;
      padding: 0 1px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state h3 { font-size: 15px; margin-bottom: 6px; color: var(--text); }
    .empty-state p { font-size: 12.5px; }

    /* avatar colors */
    .av-mauri  { background: #06b6d418; color: #22d3ee; }
    .av-win    { background: #3b82f618; color: #60a5fa; }
    .av-jime   { background: #ec489918; color: #f472b6; }
    .av-juanpa { background: #f59e0b18; color: #fbbf24; }
    .av-lu     { background: #10b98118; color: #34d399; }
    .av-luigi  { background: #8b5cf618; color: #a78bfa; }
    .av-pablos { background: #ef444418; color: #f87171; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>

<aside class="sidebar">

    <h1>Design MoMs</h1>

  </div>

  <div class="sec" id="sec-personas">

    <div class="sec-body">

  </div>

      <span class="sec-label">Month</span>
    </div>
    <div class="sec-body">
      <ul class="month-list" id="monthList"></ul>

  </div>

  <div class="sec" id="sec-filtros">

      <span class="sec-label">Filters</span>
    </div>
    <div class="sec-body">
      <div class="quick-list" id="quickList"></div>
    </div>
  </div>

  <button class="clear-btn" id="clearBtn" onclick="clearFilters()">Clear filters</button>
</aside>

<div class="main">
  <div class="topbar">
    <div class="search-wrap">

    <span class="result-count" id="resultCount"></span>

  <div class="active-filters" id="activeFilters"></div>
  <div class="feed" id="feed"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <h3>No results</h3>
    <p>Try adjusting your filters or search.</p>
  </div>
</div>

// ── CONFIG ──
const members = [
  { key: "mauri",  label: "Mauri",  av: "av-mauri"  },
  { key: "win",    label: "Win",    av: "av-win"    },
  { key: "juanpa", label: "JuanPa", av: "av-juanpa" },
  { key: "lu",     label: "Lu",     av: "av-lu"     },
  { key: "luigi",  label: "Luigi",  av: "av-luigi"  },
  { key: "pablos", label: "Pablos", av: "av-pablos" },
];

// ── STATE ──
let activeMonth    = null;
let activePersons  = [];
let searchQ        = "";
let collapsedMonths   = new Set();
let collapsedSections = new Set();
let filterMichi    = false;
let filterFullTeam = false;
let filterBajada   = false;

// ── HELPERS ──
function monthKey(iso) { return iso.slice(0, 7); }

function monthLabel(key) {
  const [y, m] = key.split("-");
  return new Date(+y, +m - 1, 1).toLocaleDateString("en-US", { month: "long", year: "numeric" });
}

function monthLabelShort(key) {
  const [y, m] = key.split("-");
  return new Date(+y, +m - 1, 1).toLocaleDateString("en-US", { month: "short", year: "2-digit" });
}

function weekday(iso) {
  return new Date(iso + "T00:00:00").toLocaleDateString("en-US", { weekday: "short" });
}

function dayNum(iso) { return iso.slice(8); }

function hasActive() {
  return !!(activeMonth || activePersons.length || filterMichi || filterFullTeam || filterBajada || searchQ);
}

// ── FILTER ──
function filtered() {
  const q = searchQ.toLowerCase();
  return [...meetings].reverse().filter(m => {
    if (activeMonth && monthKey(m.date) !== activeMonth) return false;
    if (activePersons.length && !activePersons.every(p => (m.wip[p] || "").trim())) return false;
    if (filterMichi && !m.michi) return false;
    if (filterBajada && !m.bajada) return false;
    if (filterFullTeam) {
      const core = ["win","juanpa","lu","luigi","pablos"];
      if (!core.every(p => m.participants.some(part =>
        part.toLowerCase() === (members.find(mb => mb.key === p)?.label.toLowerCase())
      ))) return false;
    }
    if (q) {
      const guestNotes = (m.guests || []).map(g => g.name + " " + g.notes).join(" ");
      const blob = [m.michi, m.bajada, ...Object.values(m.wip), m.participants.join(" "), guestNotes].join(" ").toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
}

function hl(text) {
  if (!searchQ) return text;
  const re = new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi");
  return text.replace(re, "<mark>$1</mark>");
}

// ── SIDEBAR ──
function buildSidebarStats() {
  const dates = meetings.map(m => m.date).sort();
  const fmt = iso => new Date(iso + "T00:00:00").toLocaleDateString("en-US", { month: "short", year: "2-digit" });
  document.getElementById("sidebarStats").textContent =
    `${meetings.length} standups · ${fmt(dates[0])} – ${fmt(dates[dates.length - 1])}`;
}

function buildMonthList() {
  const counts = {};
  meetings.forEach(m => { const k = monthKey(m.date); counts[k] = (counts[k] || 0) + 1; });
  const keys = [...new Set(meetings.map(m => monthKey(m.date)))].sort().reverse();

  const ul = document.getElementById("monthList");
  ul.innerHTML = "";

  const allLi = document.createElement("li");
  allLi.className = "month-item" + (!activeMonth ? " active" : "");
  allLi.innerHTML = `<span>All time</span><span class="month-count">${meetings.length}</span>`;
  allLi.onclick = () => { activeMonth = null; render(); };
  ul.appendChild(allLi);

  keys.forEach(k => {
    const li = document.createElement("li");
    li.className = "month-item" + (activeMonth === k ? " active" : "");
    li.innerHTML = `<span style="text-transform:capitalize">${monthLabelShort(k)}</span><span class="month-count">${counts[k]}</span>`;
    li.onclick = () => { activeMonth = activeMonth === k ? null : k; render(); };
    ul.appendChild(li);
  });
}

function buildPersonList() {
  document.getElementById("personList").innerHTML = members.map(({ key, label, av }) => `
    <div class="person-pill ${activePersons.includes(key) ? "active" : ""}" onclick="togglePerson('${key}')">
      <span class="pill-av ${av}">${label[0]}</span>
      <span>${label}</span>
    </div>`).join("");
}

function buildQuickFilters() {
  document.getElementById("quickList").innerHTML = `
    <div class="quick-item ${filterBajada ? "active" : ""}" onclick="toggleQuick('bajada')">
      <span class="quick-icon">📣</span>Leadership Briefing
    </div>
    <div class="quick-item ${filterMichi ? "active" : ""}" onclick="toggleQuick('michi')">
      <span class="quick-icon">💬</span>Michi time
    </div>
    <div class="quick-item ${filterFullTeam ? "active" : ""}" onclick="toggleQuick('full')">
      <span class="quick-icon">👥</span>Full team
    </div>`;
}

function toggleSection(id) {
  const el = document.getElementById("sec-" + id);
  if (!el) return;
  collapsedSections.has(id) ? collapsedSections.delete(id) : collapsedSections.add(id);
  el.classList.toggle("collapsed", collapsedSections.has(id));
}

function togglePerson(key) {
  activePersons = activePersons.includes(key)
    ? activePersons.filter(p => p !== key)
    : [...activePersons, key];
  render();
}

function toggleQuick(type) {
  if (type === "bajada") filterBajada   = !filterBajada;
  if (type === "michi")  filterMichi    = !filterMichi;
  if (type === "full")   filterFullTeam = !filterFullTeam;
  render();
}

function clearFilters() {
  activeMonth = null; activePersons = [];
  filterMichi = false; filterFullTeam = false; filterBajada = false;
  searchQ = "";
  document.getElementById("search").value = "";
  render();
}

// ── CHIPS ──
function buildChips() {
  const xBtn = (cb) => `<button onclick="${cb}">
    <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
  </button>`;

  const chips = [];
  if (activeMonth) {
    const lbl = monthLabel(activeMonth);
    chips.push(`<span class="filter-chip">${lbl[0].toUpperCase() + lbl.slice(1)}${xBtn("activeMonth=null;render()")}</span>`);
  }
  activePersons.forEach(key => {
    const mb = members.find(m => m.key === key);
    chips.push(`<span class="filter-chip">${mb.label}${xBtn(`activePersons=activePersons.filter(p=>p!=='${key}');render()`)}</span>`);
  });
  if (filterBajada)   chips.push(`<span class="filter-chip">Leadership Briefing${xBtn("filterBajada=false;render()")}</span>`);
  if (filterMichi)    chips.push(`<span class="filter-chip">Michi time${xBtn("filterMichi=false;render()")}</span>`);
  if (filterFullTeam) chips.push(`<span class="filter-chip">Full team${xBtn("filterFullTeam=false;render()")}</span>`);

  document.getElementById("activeFilters").innerHTML = chips.join("");
}

// ── RENDER ──
function render() {
  buildMonthList();
  buildPersonList();
  buildQuickFilters();
  buildChips();

  document.getElementById("clearBtn").classList.toggle("visible", hasActive());

  const results = filtered();
  const feed    = document.getElementById("feed");
  const empty   = document.getElementById("emptyState");

  document.getElementById("resultCount").textContent =
    `${results.length} standup${results.length !== 1 ? "s" : ""}`;

  if (!results.length) { feed.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";

  const groups = {};
  results.forEach(m => { const k = monthKey(m.date); (groups[k] = groups[k] || []).push(m); });

  feed.innerHTML = Object.entries(groups).map(([month, items]) => {
    const collapsed = collapsedMonths.has(month);
    return `
      <div class="month-group ${collapsed ? "collapsed" : ""}" id="mg-${month}">
        <div class="month-header" onclick="toggleMonth('${month}')">
          <svg class="mh-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m6 9 6 6 6-6"/></svg>
          <span class="mh-title">${monthLabel(month)}</span>
          <span class="mh-line"></span>
          <span class="mh-badge">${items.length} standup${items.length !== 1 ? "s" : ""}</span>
        </div>
        <div class="month-cards">${items.map((m, i) => renderCard(m, month + i)).join("")}</div>
      </div>`;
  }).join("");
}

function renderCard(m, id) {
  const presentNames = new Set(m.participants.map(p => p.toLowerCase()));

  const wipCards = members.map(({ key, label, av }) => {
    const text    = (m.wip[key] || "").trim();
    const present = presentNames.has(label.toLowerCase());
    if (!text && !present) return "";
    return `
      <div class="wip-card ${!text ? "empty" : ""}">
        <div class="wip-member">
          <span class="wip-av ${av}">${label[0]}</span>
          <span class="wip-name">${label}</span>
        </div>
        <div class="wip-text">${text ? hl(text) : "—"}</div>
      </div>`;
  }).join("");

  const michiHtml = m.michi ? `
    <div class="michi-block">
      <div class="michi-label">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Michi time
      </div>
      <div class="michi-text">${hl(m.michi)}</div>
    </div>` : "";

  const guestsHtml = (m.guests && m.guests.length) ? `
    <div class="guests-section">
      <div class="guests-label">Guests</div>
      ${m.guests.map(g => `
      <div class="guest-card">
        <div class="guest-name">${g.name}</div>
        <div class="guest-text">${hl(g.notes)}</div>
      </div>`).join("")}
    </div>` : "";

  const bajadaHtml = m.bajada ? `
    <div class="bajada-block">
      <div class="bajada-label">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V4M5 13l7 7 7-7"/></svg>
        Leadership Briefing (Mauricio)
      </div>
      <div class="bajada-text">${hl(m.bajada)}</div>
    </div>` : "";

  const withUpdates = members.filter(({ key }) => (m.wip[key] || "").trim()).map(({ label }) => label);
  const preview     = withUpdates.length ? withUpdates.join(" · ") : m.participants.join(" · ");

  const participantAvatars = members
    .filter(({ label }) => presentNames.has(label.toLowerCase()))
    .map(({ label, av }) => `<span class="cav ${av}">${label[0]}</span>`)
    .join("");

  return `
    <div class="card" id="card-${id}">
      <div class="card-header" onclick="document.getElementById('card-${id}').classList.toggle('open')">
        <div class="card-day">
          <span class="card-wd">${weekday(m.date)}</span>
          <span class="card-dd">${dayNum(m.date)}</span>
          ${m.fathomUrl ? `<a class="fathom-btn" href="${m.fathomUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Watch recording">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </a>` : `<div class="card-day-no-rec"></div>`}
        </div>
        <div class="card-sep"></div>
        <div class="card-info">
          <div class="card-avs">${participantAvatars}</div>
          <div class="card-preview">${hl(preview)}</div>
        </div>
        <div class="card-meta">
          ${m.bajada ? `<span class="michi-dot" style="background:#22d3ee" title="Leadership Briefing"></span>` : ""}
          ${m.michi ? `<span class="michi-dot" title="Michi time"></span>` : ""}
          ${(m.guests && m.guests.length) ? `<span class="michi-dot" style="background:#a78bfa" title="Guests"></span>` : ""}
          ${m.duration ? `<span class="dur-badge">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${m.duration}
          </span>` : ""}
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
      <div class="card-body">
        ${michiHtml}
        ${bajadaHtml}
        <div class="wip-label">Work in progress</div>
        <div class="wip-grid">${wipCards}</div>
        ${guestsHtml}
      </div>
    </div>`;
}

function toggleMonth(month) {
  collapsedMonths.has(month) ? collapsedMonths.delete(month) : collapsedMonths.add(month);
  document.getElementById("mg-" + month)?.classList.toggle("collapsed", collapsedMonths.has(month));
}

// ── SEARCH ──
document.getElementById("search").addEventListener("input", e => {
  searchQ = e.target.value.trim().toLowerCase();
  render();
});

// ── INIT ──
[...new Set(meetings.map(m => monthKey(m.date)))].forEach(k => collapsedMonths.add(k));
buildSidebarStats();
render();
</script>
